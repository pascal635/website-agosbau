document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

A, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"98dc9c7c-f474-4243-8138-2750e2604d32\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    /* Slate — cool neutrals (brand primary) */\n    --anthrazit: #26333D;\n    --dunkelgrau: #4A5A66;\n    --mittelgrau: #7B8B96;\n    --hellgrau: #B4BEC6;\n    --offwhite: #EEF0F2;\n    --weiss: #FFFFFF;\n    /* Accent — Warm Tan / Brass */\n    --copper: #C39A63;\n    --copper-hell: #D8B488;\n    --copper-sehrhell: #F0E6D6;\n\n    --rule: #DEE1E5;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  body {\n    font-family: 'Archivo', -apple-system, BlinkMacSystemFont, sans-serif;\n    font-weight: 400;\n    font-size: 16px;\n    line-height: 1.65;\n    color: var(--dunkelgrau);\n    background: var(--offwhite);\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n  }\n\n  h1, h2, h3, h4 {\n    font-family: 'Cormorant Garamond', Georgia, serif;\n    color: var(--anthrazit);\n    line-height: 1.05;\n    font-weight: 600;\n    letter-spacing: -0.005em;\n  }\n\n  .mono {\n    font-family: 'JetBrains Mono', ui-monospace, monospace;\n    font-size: 11px;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    color: var(--mittelgrau);\n  }\n\n  /* ---------- Layout ---------- */\n\n  .wrap {\n    max-width: 1240px;\n    margin: 0 auto;\n    padding: 0 48px;\n  }\n\n  section {\n    padding: 128px 0;\n    border-top: 1px solid var(--rule);\n  }\n  section:first-of-type { border-top: none; }\n\n  .section-head {\n    display: grid;\n    grid-template-columns: 180px 1fr;\n    gap: 48px;\n    margin-bottom: 80px;\n    align-items: start;\n  }\n  .section-head .number {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px;\n    color: var(--copper);\n    letter-spacing: 0.18em;\n    padding-top: 18px;\n    border-top: 1px solid var(--copper);\n    display: inline-block;\n    min-width: 120px;\n  }\n  .section-head h2 {\n    font-size: 52px;\n    font-weight: 800;\n    letter-spacing: -0.01em;\n  }\n  .section-head .lead {\n    margin-top: 24px;\n    max-width: 640px;\n    font-size: 18px;\n    line-height: 1.6;\n    color: var(--dunkelgrau);\n  }\n\n  /* ---------- Top bar ---------- */\n\n  .topbar {\n    position: sticky;\n    top: 0;\n    z-index: 50;\n    background: rgba(238, 240, 242, 0.9);\n    backdrop-filter: blur(10px);\n    -webkit-backdrop-filter: blur(10px);\n    border-bottom: 1px solid var(--rule);\n  }\n  .topbar-inner {\n    max-width: 1240px;\n    margin: 0 auto;\n    padding: 18px 48px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n  }\n  .topbar-logo {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    font-family: 'Archivo', sans-serif;\n    font-weight: 800;\n    font-size: 14px;\n    letter-spacing: 0.14em;\n    color: var(--anthrazit);\n  }\n  .topbar-logo svg { width: 24px; height: 30px; display: block; }\n  .topbar-nav {\n    display: flex;\n    gap: 28px;\n  }\n  .topbar-nav a {\n    font-family: 'Archivo', sans-serif;\n    font-weight: 600;\n    font-size: 12px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--mittelgrau);\n    text-decoration: none;\n    transition: color 0.2s ease;\n  }\n  .topbar-nav a:hover { color: var(--anthrazit); }\n  .topbar-meta {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: var(--mittelgrau);\n    letter-spacing: 0.06em;\n  }\n\n  /* ---------- Hero ---------- */\n\n  .hero {\n    padding: 120px 0 140px;\n    border-top: none;\n  }\n  .hero-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 80px;\n    align-items: end;\n  }\n  .hero-meta {\n    display: flex;\n    gap: 40px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--mittelgrau);\n    margin-bottom: 48px;\n  }\n  .hero-meta span::before {\n    content: \"\";\n    display: inline-block;\n    width: 24px;\n    height: 1px;\n    background: var(--copper);\n    vertical-align: middle;\n    margin-right: 10px;\n  }\n  .hero h1 {\n    font-size: clamp(56px, 7vw, 104px);\n    font-weight: 800;\n    line-height: 0.95;\n    letter-spacing: -0.005em;\n    color: var(--anthrazit);\n    margin-bottom: 32px;\n  }\n  .hero h1 em {\n    font-style: normal;\n    color: var(--copper);\n  }\n  .hero-lead {\n    font-size: 20px;\n    line-height: 1.55;\n    color: var(--dunkelgrau);\n    max-width: 480px;\n  }\n  .hero-index {\n    display: flex;\n    flex-direction: column;\n    gap: 0;\n    border-top: 1px solid var(--rule);\n  }\n  .hero-index a {\n    display: grid;\n    grid-template-columns: 60px 1fr auto;\n    gap: 24px;\n    padding: 22px 0;\n    border-bottom: 1px solid var(--rule);\n    text-decoration: none;\n    transition: padding-left 0.3s ease;\n  }\n  .hero-index a:hover { padding-left: 8px; }\n  .hero-index a:hover .idx-title { color: var(--copper); }\n  .hero-index .idx-num {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px;\n    color: var(--mittelgrau);\n    letter-spacing: 0.08em;\n  }\n  .hero-index .idx-title {\n    font-family: 'Archivo', sans-serif;\n    font-weight: 700;\n    font-size: 18px;\n    color: var(--anthrazit);\n    transition: color 0.2s;\n  }\n  .hero-index .idx-arrow {\n    color: var(--mittelgrau);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 14px;\n  }\n\n  /* Hero — slate feature band */\n  .hero {\n    background: var(--anthrazit);\n    box-shadow: 0 0 0 100vmax var(--anthrazit);\n    clip-path: inset(0 -100vmax);\n    color: var(--hellgrau);\n    padding: 120px 48px 132px;\n  }\n  .hero .hero-meta { color: var(--copper); margin-bottom: 44px; }\n  .hero .hero-meta span::before { background: var(--copper); }\n  .hero h1 { color: #F4F1EC; }\n  .hero h1 em { color: var(--copper); }\n  .hero-lead { color: #C5CDD3; }\n  .hero-index { border-top-color: rgba(255,255,255,0.18); }\n  .hero-index a { border-bottom-color: rgba(255,255,255,0.12); }\n  .hero-index .idx-num { color: var(--copper); }\n  .hero-index .idx-title { color: #ECEFF1; }\n  .hero-index .idx-arrow { color: var(--mittelgrau); }\n  .hero-index a:hover .idx-title { color: var(--copper); }\n\n  /* ---------- Logo showcase ---------- */\n\n  .logo-main-tile {\n    background: var(--weiss);\n    padding: 100px 40px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    border: 1px solid var(--rule);\n    margin-bottom: 32px;\n    position: relative;\n  }\n  .logo-main-tile img {\n    width: 420px;\n    max-width: 100%;\n    height: auto;\n  }\n  .logo-main-tile::before,\n  .logo-main-tile::after {\n    content: \"\";\n    position: absolute;\n    background: var(--copper);\n  }\n  .logo-main-tile::before { top: 24px; left: 24px; width: 16px; height: 1px; }\n  .logo-main-tile::after { top: 24px; left: 24px; width: 1px; height: 16px; }\n\n  .logo-variants {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 16px;\n    margin-top: 48px;\n  }\n  .logo-variant {\n    aspect-ratio: 1 / 1;\n    border: 1px solid var(--rule);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 32px;\n    position: relative;\n  }\n  .logo-variant .mono {\n    position: absolute;\n    bottom: 16px;\n    left: 16px;\n  }\n  .logo-variant.on-white { background: var(--weiss); }\n  .logo-variant.on-dark  { background: var(--anthrazit); }\n  .logo-variant.on-dark .mono { color: var(--hellgrau); }\n  .logo-variant.on-copper { background: var(--copper); }\n  .logo-variant.on-copper .mono { color: var(--copper-sehrhell); }\n  .logo-variant.mono-black { background: var(--offwhite); }\n  .logo-variant svg { width: 60%; height: auto; }\n  .logo-variant.on-white svg, .logo-variant.mono-black svg { color: var(--anthrazit); }\n  .logo-variant.on-dark svg, .logo-variant.on-copper svg { color: #FFFFFF; }\n\n  /* Clear zone diagram */\n  .clearzone {\n    background: var(--weiss);\n    border: 1px solid var(--rule);\n    padding: 64px;\n    margin-top: 48px;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 64px;\n    align-items: center;\n  }\n  .clearzone-visual {\n    position: relative;\n    width: 100%;\n    aspect-ratio: 1.2 / 1;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n  .clearzone-visual .logo-box {\n    position: relative;\n    padding: 36px;\n    border: 1px dashed var(--copper);\n  }\n  .clearzone-visual .logo-box img { width: 200px; display: block; }\n  .clearzone-visual .dim {\n    position: absolute;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: var(--copper);\n    letter-spacing: 0.06em;\n  }\n  .clearzone-visual .dim.top { top: 14px; left: 50%; transform: translateX(-50%); }\n  .clearzone-visual .dim.left { top: 50%; left: 6px; transform: translateY(-50%); }\n  .clearzone h3 {\n    font-family: 'Cormorant Garamond', Georgia, serif;\n    font-weight: 600;\n    font-size: 28px;\n    margin-bottom: 16px;\n    font-weight: 700;\n  }\n  .clearzone p { font-size: 15px; line-height: 1.65; }\n\n  /* ---------- Colors ---------- */\n\n  .color-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 1px;\n    background: var(--rule);\n    border: 1px solid var(--rule);\n  }\n  .color-row {\n    display: contents;\n  }\n  .swatch {\n    background: var(--weiss);\n    padding: 40px 32px 32px;\n    display: flex;\n    flex-direction: column;\n    position: relative;\n    min-height: 260px;\n  }\n  .swatch-chip {\n    width: 100%;\n    height: 140px;\n    margin-bottom: 28px;\n    position: relative;\n    border: 1px solid rgba(0,0,0,0.04);\n  }\n  .swatch .name {\n    font-family: 'Archivo', sans-serif;\n    font-weight: 700;\n    font-size: 15px;\n    color: var(--anthrazit);\n    letter-spacing: 0.02em;\n    margin-bottom: 6px;\n  }\n  .swatch .hex {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px;\n    color: var(--mittelgrau);\n    letter-spacing: 0.04em;\n    margin-bottom: 16px;\n  }\n  .swatch .use {\n    font-size: 13px;\n    color: var(--dunkelgrau);\n    line-height: 1.5;\n    margin-top: auto;\n  }\n  .swatch .tag {\n    position: absolute;\n    top: 16px;\n    right: 16px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.14em;\n    color: var(--mittelgrau);\n    text-transform: uppercase;\n  }\n\n  .color-intro {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 80px;\n    margin-bottom: 64px;\n  }\n  .color-intro h3 {\n    font-family: 'Archivo', sans-serif;\n    font-size: 14px;\n    font-weight: 600;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--copper);\n    margin-bottom: 24px;\n  }\n  .color-intro p { font-size: 16px; line-height: 1.65; }\n\n  .ratio-bar {\n    display: flex;\n    height: 56px;\n    margin-top: 48px;\n    border: 1px solid var(--rule);\n  }\n  .ratio-bar .seg {\n    display: flex;\n    align-items: center;\n    padding: 0 16px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n  }\n  .ratio-bar .seg-offwhite { flex: 55; background: var(--offwhite); color: var(--dunkelgrau); }\n  .ratio-bar .seg-anthrazit { flex: 22; background: var(--anthrazit); color: var(--weiss); }\n  .ratio-bar .seg-grey { flex: 14; background: var(- row\"><span class=\"wname\">400 · Regular<\u002Fspan><span class=\"sample-400\">Wir sanieren Ihr Bad.<\u002Fspan><\u002Fdiv>\n        <div class=\"weight-row\"><span class=\"wname\">500 · Medium<\u002Fspan><span class=\"sample-500\">Persönlich. Festpreis.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:30px;margin-bottom:8px;\">Hierarchie &amp; Skala<\u002Fh3>\n  <p style=\"max-width:640px;margin-bottom:40px;\">Desktop-Werte. Mobil ca. 60–75 % der Größe. Line-Height: Headlines 1.1, Fließtext 1.65.<\u002Fp>\n\n  <div class=\"scale-list\">\n    <div class=\"scale-row h1\">\n      <span class=\"step\">H1 · 01<\u002Fspan>\n      <span class=\"preview\">FLIESEN IN BREMEN<\u002Fspan>\n      <span class=\"specs\">Cormorant 600 · 64px<\u002Fspan>\n      <span class=\"use\">Hero-Headlines<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"scale-row h2\">\n      <span class=\"step\">H2 · 02<\u002Fspan>\n      <span class=\"preview\">Ihr Bad. Neu. Fertig.<\u002Fspan>\n      <span class=\"specs\">Cormorant 600 · 44px<\u002Fspan>\n      <span class=\"use\">Sektionstitel<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"scale-row h3\">\n      <span class=\"step\">H3 · 03<\u002Fspan>\n      <span class=\"preview\">Festpreis-Garantie<\u002Fspan>\n      <span class=\"specs\">Cormorant 600 · 28px<\u002Fspan>\n      <span class=\"use\">Karten, Unterpunkte<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"scale-row lead\">\n      <span class=\"step\">Lead · 04<\u002Fspan>\n      <span class=\"preview\">Seit 2019 sanieren wir Bäder in Achim und Bremen — persönlich und präzise.<\u002Fspan>\n      <span class=\"specs\">Archivo 500 · 20px<\u002Fspan>\n      <span class=\"use\">Subheadline, Lead<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"scale-row body\">\n      <span class=\"step\">Body · 05<\u002Fspan>\n      <span class=\"preview\">André Gostomczyk und sein Team übernehmen jedes Projekt von der Beratung bis zur Schlussabnahme — mit Festpreis und ohne Überraschungen.<\u002Fspan>\n      <span class=\"specs\">Archivo 400 · 16px<\u002Fspan>\n      <span class=\"use\">Fließtext<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"scale-row caption\">\n      <span class=\"step\">Caption · 06<\u002Fspan>\n      <span class=\"preview\">Projekt 01 · Villa Oberneuland · 2024<\u002Fspan>\n      <span class=\"specs\">Archivo 400 · 13px<\u002Fspan>\n      <span class=\"use\">Bildtexte, Meta<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 04 KOMPONENTEN -->\n<section id=\"komponenten\" class=\"wrap\">\n  <div class=\"section-head\">\n    <span class=\"number\">04 — Komponenten<\u002Fspan>\n    <div>\n      <h2>Sauber gebaut. Wie eine Fuge.<\u002Fh2>\n      <p class=\"lead\">Die Bausteine der Seite. Buttons, Karten, Formulare, Rules. Alle folgen demselben Prinzip: klare Kanten, leichte Radien, keine übertriebenen Effekte.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"comp-grid\">\n    <div class=\"comp\">\n      <span class=\"tag\">01 · Buttons<\u002Fspan>\n      <h3>Primär &amp; Sekundär<\u002Fh3>\n      <div class=\"demo\">\n        <a href=\"#\" class=\"btn btn-primary\">Angebot anfragen →<\u002Fa>\n        <a href=\"#\" class=\"btn btn-secondary\">Projekte ansehen<\u002Fa>\n        <a href=\"#\" class=\"btn btn-ghost\">Mehr erfahren<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"specs\">\n        <div><span class=\"k\">Primär<\u002Fspan> · bg #C39A63 · Archivo 700 · 14px · 14/28px · radius 4px<\u002Fdiv>\n        <div><span class=\"k\">Sekundär<\u002Fspan> · transparent · 2px border #26333D · Hover: invertiert<\u002Fdiv>\n        <div><span class=\"k\">Ghost<\u002Fspan> · Unterlinie, keine Fläche · für Tertiär-Aktionen<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"comp\">\n      <span class=\"tag\">02 · Karte<\u002Fspan>\n      <h3>Service-Card<\u002Fh3>\n      <div class=\"demo\">\n        <div class=\"card\">\n          <div class=\"icon-box\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M3 12 L12 3 L21 12\"><\u002Fpath>\n              <path d=\"M5 11 V20 H19 V11\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <h4>Badsanierung komplett<\u002Fh4>\n          <p>Von Rückbau bis Schlussabnahme. Festpreis. Ein Ansprechpartner. Im Schnitt 3 Wochen Bauzeit.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"specs\">\n        <div><span class=\"k\">bg<\u002Fspan> #FFFFFF · <span class=\"k\">radius<\u002Fspan> 6px · <span class=\"k\">padding<\u002Fspan> 28px<\u002Fdiv>\n        <div><span class=\"k\">shadow<\u002Fspan> 0 2px 12px rgba(0,0,0,0.08)<\u002Fdiv>\n        <div><span class=\"k\">hover<\u002Fspan> 0 6px 24px rgba(0,0,0,0.14)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"comp\">\n      <span class=\"tag\">03 · Formular<\u002Fspan>\n      <h3>Input-Felder<\u002Fh3>\n      <div class=\"demo\" style=\"flex-direction:column;align-items:flex-start;\">\n        <div class=\"form-demo\">\n          <div class=\"form-group\">\n            <label>Name<\u002Flabel>\n            <input type=\"text\" value=\"André Gostomczyk\">\n          <\u002Fdiv>\n          <div class=\"form-group\">\n            <label>E-Mail (Fokus-Zustand)<\u002Flabel>\n            <input type=\"email\" value=\"andre@agosbau.de\" autofocus=\"\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"specs\">\n        <div><span class=\"k\">border<\u002Fspan> 1px #B4BEC6 · <span class=\"k\">radius<\u002Fspan> 4px · 12/16px padding<\u002Fdiv>\n        <div><span class=\"k\">focus<\u002Fspan> 2px solid #C39A63 (Tan)<\u002Fdiv>\n        <div><span class=\"k\">label<\u002Fspan> Archivo 500 · 13px · #4A5A66<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"comp\">\n      <span class=\"tag\">04 · Linien &amp; Zitat<\u002Fspan>\n      <h3>Dekorative Elemente<\u002Fh3>\n      <div class=\"demo\" style=\"flex-direction:column;align-items:stretch;gap:28px;\">\n        <div class=\"rule-demo\">\n          <div class=\"since-block\">\n            <span class=\"line\"><\u002Fspan>\n            <span>SINCE 2019<\u002Fspan>\n            <span class=\"line\"><\u002Fspan>\n          <\u002Fdiv>\n          <blockquote class=\"bq\">\n            Die Leidenschaft fürs Handwerk soll man sehen.\n            <cite>— André Gostomczyk, Inhaber<\u002Fcite>\n          <\u002Fblockquote>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"specs\">\n        <div><span class=\"k\">rule<\u002Fspan> 1px #B4BEC6 · dekorativ, sparsam<\u002Fdiv>\n        <div><span class=\"k\">blockquote<\u002Fspan> 3px solid #C39A63 links · Archivo 500 Italic<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 05 BILDSPRACHE -->\n<section id=\"bildsprache\" class=\"wrap\">\n  <div class=\"section-head\">\n    <span class=\"number\">05 — Bildsprache<\u002Fspan>\n    <div>\n      <h2>Keine Stockfotos. Nie.<\u002Fh2>\n      <p class=\"lead\">Jedes Bild ist echt. Vom Team, von den Projekten, aus dem Alltag. Natürliches Licht, warme Töne, hohe Schärfe. Die Platzhalter unten beschreiben die Soll-Aufnahmen für das Shooting.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"img-grid\">\n    <div class=\"img-tile hero\">\n      <div class=\"bg-pattern\"><\u002Fdiv>\n      <div class=\"radial\"><\u002Fdiv>\n      <span class=\"index\">01 — Hero<\u002Fspan>\n      <div>\n        <span class=\"label\">Portrait · 16:9 · natürliches Licht<\u002Fspan>\n        <div class=\"title\">André auf der Baustelle, Fliese in der Hand, konzentrierter Blick<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"img-tile\">\n      <div class=\"bg-pattern\"><\u002Fdiv>\n      <span class=\"index\">02<\u002Fspan>\n      <div>\n        <span class=\"label\">Detail · 1:1<\u002Fspan>\n        <div class=\"title\">Hände bei der Fugenarbeit<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"img-tile\">\n      <div class=\"bg-pattern\"><\u002Fdiv>\n      <span class=\"index\">03<\u002Fspan>\n      <div>\n        <span class=\"label\">Projekt · 3:2<\u002Fspan>\n        <div class=\"title\">Fertiges Bad, Oberneuland<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"img-tile\">\n      <div class=\"bg-pattern\"><\u002Fdiv>\n      <span class=\"index\">04<\u002Fspan>\n      <div>\n        <span class=\"label\">Team · 16:9<\u002Fspan>\n        <div class=\"title\">4 Mitarbeiter auf der Baustelle<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"img-tile\">\n      <div class=\"bg-pattern\"><\u002Fdiv>\n      <span class=\"index\">05<\u002Fspan>\n      <div>\n        <span class=\"label\">Prozess · 3:2<\u002Fspan>\n        <div class=\"title\">Nivelliersystem im Einsatz<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"do-dont\">\n    <div class=\"dd-block do\">\n      <h4>Bildsprache · Ja<\u002Fh4>\n      <ul class=\"dd-list\">\n        <li>Echte Aufnahmen aus echten Projekten<\u002Fli>\n        <li>Natürliches Licht, warme Temperatur<\u002Fli>\n        <li>Handwerk im Detail — Hände, Werkzeug, Fugen<\u002Fli>\n        <li>André persönlich, prominent platziert<\u002Fli>\n        <li>Scharfe Aufnahmen — Handwerk muss scharf sein<\u002Fli>\n        <li>Vorher/Nachher im gleichen Winkel<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"dd-block dont\">\n      <h4>Bildsprache · Nein<\u002Fh4>\n      <ul class=\"dd-list\">\n        <li>Stockfotos — sofort erkennbar, zerstören Vertrauen<\u002Fli>\n        <li>Harter Blitz, kaltblaues Licht<\u002Fli>\n        <li>Übersättigte Farben, Instagram-Filter<\u002Fli>\n        <li>Fischaugen-Perspektiven, schiefe Horizonte<\u002Fli>\n        <li>Posierte Gruppenfotos mit verschränkten Armen<\u002Fli>\n        <li>Generische Handwerker-Symbolbilder<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 06 SPACING -->\n<section id=\"spacing\" class=\"wrap\">\n  <div class=\"section-head\">\n    <span class=\"number\">06 — Spacing<\u002Fspan>\n    <div>\n      <h2>8-Pixel-Raster. Immer.<\u002Fh2>\n      <p class=\"lead\">Jeder Abstand ist ein Vielfaches von 8. Keine Ausnahmen, keine Bauchgefühl-Werte. Das ist, was die Seite präzise wirken lässt — wie eine gerade Fliesenreihe.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"spacing-grid\">\n    <div>\n      <div class=\"spacing-list\">\n        <div class=\"sp-row\"><span class=\"px\">04 px<\u002Fspan><span class=\"bar bar-4\"><\u002Fspan><span class=\"note\">Icon zu Text<\u002Fspan><\u002Fdiv>\n        <div class=\"sp-row\"><span class=\"px\">08 px<\u002Fspan><span class=\"bar bar-8\"><\u002Fspan><span class=\"note\">Kleiner Innenabstand<\u002Fspan><\u002Fdiv>\n        <div class=\"sp-row\"><span class=\"px\">16 px<\u002Fspan><span class=\"bar bar-16\"><\u002Fspan><span class=\"note\">Standard-Abstand<\u002Fspan><\u002Fdiv>\n        <div class=\"sp-row\"><span class=\"px\">24 px<\u002Fspan><span class=\"bar bar-24\"><\u002Fspan><span class=\"note\">Gruppenabstand<\u002Fspan><\u002Fdiv>\n        <div class=\"sp-row\"><span class=\"px\">32 px<\u002Fspan><span class=\"bar bar-32\"><\u002Fspan><span class=\"note\">Zwischen Komponenten<\u002Fspan><\u002Fdiv>\n        <div class=\"sp-row\"><span class=\"px\">48 px<\u002Fspan><span class=\"bar bar-48\"><\u002Fspan><span class=\"note\">Sektionsintern<\u002Fspan><\u002Fdiv>\n        <div class=\"sp-row\"><span class=\"px\">64 px<\u002Fspan><span class=\"bar bar-64\"><\u002Fspan><span class=\"note\">Sektion · Mobile<\u002Fspan><\u002Fdiv>\n        <div class=\"sp-row\"><span class=\"px\">96 px<\u002Fspan><span class=\"bar bar-96\"><\u002Fspan><span class=\"note\">Sektion · Desktop<\u002Fspan><\u002Fdiv>\n        <div class=\"sp-row\"><span class=\"px\">128 px<\u002Fspan><span class=\"bar bar-128\"><\u002Fspan><span class=\"note\">Großzügiger Hero<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <span class=\"mono\" style=\"display:block;margin-bottom:16px;\">Prinzipien<\u002Fspan>\n      <h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:30px;margin-bottom:16px;\">Weißraum ist ein Element.<\u002Fh3>\n      <p style=\"font-size:15px;line-height:1.7;margin-bottom:24px;\">Leere Fläche ist kein „ungenutzter Platz\" — sie ist Teil der Komposition. Sie gibt Headlines Gewicht, lässt Bilder wirken und trennt Gedanken voneinander.<\u002Fp>\n      <p style=\"font-size:15px;line-height:1.7;margin-bottom:24px;\">Radien: 4 px für Buttons und Inputs, 6 px für Karten. Nie höher. Keine Pillow-Shapes, keine Kreise ohne Grund.<\u002Fp>\n      <p style=\"font-size:15px;line-height:1.7;\">Schatten: nur auf Karten, nur subtil. <code style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--anthrazit);\">0 2px 12px rgba(0,0,0,0.08)<\u002Fcode>. Nichts Wolkiges.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Footer -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <div>\n        <h3>Brand Manual<br>AGOS BAU · V 1.0<\u002Fh3>\n        <p>Dieses Dokument ist die verbindliche Grundlage für alle visuellen Umsetzungen. Abweichungen nur in Absprache. Nächste Iteration: finale Fotografie &amp; Icon-Set.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div class=\"col-title\">Kontakt<\u002Fdiv>\n        <ul>\n          <li>AGOS BAU<\u002Fli>\n          <li>André Gostomczyk<\u002Fli>\n          <li>Achim / Bremen<\u002Fli>\n          <li>agosbau.de<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <div class=\"col-title\">Ausgabe<\u002Fdiv>\n        <ul>\n          <li>Version 1.0<\u002Fli>\n          <li>24. April 2026<\u002Fli>\n          <li>WEBCLAN
